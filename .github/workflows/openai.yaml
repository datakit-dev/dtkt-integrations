name: Build, Lint, & Test OpenAI Integration Package

on:
  pull_request:
    branches:
    - main
    paths:
    - packages/openai/**
    - .github/workflows/openai.yaml

jobs:
  build-lint-test:
    name: Build, Lint, & Test
    runs-on: ${{ vars.RUNNER }}

    permissions:
      contents: read
      pull-requests: read
      checks: write

    steps:
    - uses: datakit-dev/.github/actions/setup-monorepo@main
      with:
        dtkt-dev-sparse-checkout: |
          scripts
          tasks
        dtkt-sdk-sparse-checkout: sdk-go
        dtkt-github-actions-app-id: ${{ vars.DTKT_GITHUB_ACTIONS_APP_ID }}
        dtkt-github-actions-private-key: ${{ secrets.DTKT_GITHUB_ACTIONS_PRIVATE_KEY }}

    - uses: datakit-dev/.github/actions/setup@main
      with:
        task: true
        go: true
        versions: ${{ vars.VERSIONS }}
        go-cache-dependency-path: |
          ./dtkt-universe/dtkt-integrations/packages/openai/go.sum
          ./dtkt-universe/dtkt-sdk/sdk-go/go.sum

    - run: task setup
      working-directory: ./dtkt-universe/dtkt-integrations/packages/openai

    - name: Install ALSA indirectly used by openai/cmd/audio
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Build
      run: task build
      working-directory: ./dtkt-universe/dtkt-integrations/packages/openai

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      env:
        GOEXPERIMENT: jsonv2
      with:
        version: ${{ fromJSON(vars.VERSIONS).golangci-lint }}
        working-directory: ./dtkt-universe/dtkt-integrations/packages/openai
        args: --timeout=5m

    - name: Test
      run: task test
      continue-on-error: true
      working-directory: ./dtkt-universe/dtkt-integrations/packages/openai
