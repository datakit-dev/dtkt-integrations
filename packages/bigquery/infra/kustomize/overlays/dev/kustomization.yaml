apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: bigquery
  envs:
  - configs/intgr.env
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: bigquery
    app.kubernetes.io/instance: bigquery
- includeSelectors: false
  pairs:
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/component: bigquery
    app.kubernetes.io/part-of: dtkt-integrations-bigquery
    app.kubernetes.io/managed-by: kustomize
