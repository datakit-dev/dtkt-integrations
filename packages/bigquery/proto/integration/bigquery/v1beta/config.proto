syntax = "proto3";

package integration.bigquery.v1beta;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "integration/fivetran/v1/config.proto";
import "integration/fivetran/v1/destination.proto";

option go_package = "github.com/datakit-dev/dtkt-integrations/bigquery/pkg/proto/integration/bigquery/v1beta1;bigqueryv1beta";

message Config {
  string project_id = 1 [(buf.validate.field).required = true];
  string location = 2 [(buf.validate.field).required = true];

  // Credentials JSON for a service account with permissions to read/write
  // BigQuery data and access GCS bucket; optional (if not provided, the
  // integration will attempt to use application default credentials).
  google.protobuf.Struct credentials_json = 4;

  // Optional configuration for GCP audit logging; if provided the integration
  // will support consuming BigQuery audit logs from the specified Pub/Sub topic
  // and subscription and made available via the integration's event service.
  AuditLogConfig audit_log = 5;

  oneof replication {
    // Optional configuration for Fivetran replication; if provided, the
    // integration will support Fivetran as a replication destination using
    // BigQuery configuration above.
    FivetranReplication fivetran_replication = 6;
  }
}

message AuditLogConfig {
  // The GCP Pub/Sub topic to which audit logs will be published. This topic
  // must already exist and the service account associated with the integration
  // must have permissions to subscribe to it.
  string topic = 1 [(buf.validate.field).required = true];

  // The GCP Pub/Sub subscription that will be used to consume audit logs. This
  // subscription must already exist and be subscribed to the specified topic.
  string subscription = 2 [(buf.validate.field).required = true];
}

message FivetranReplication {
  integration.fivetran.v1.Config config = 1 [(buf.validate.field).required = true];
  integration.fivetran.v1.Destination destination = 2 [(buf.validate.field).required = true];
}
