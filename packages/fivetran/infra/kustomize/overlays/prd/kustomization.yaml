apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
components:
- ../../components/resilient
configMapGenerator:
- name: fivetran
  envs:
  - configs/intgr.env
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: fivetran
    app.kubernetes.io/instance: fivetran
- includeSelectors: false
  pairs:
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/component: fivetran
    app.kubernetes.io/part-of: dtkt-integrations-fivetran
    app.kubernetes.io/managed-by: kustomize
