apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
components:
- ../../components/resilient
configMapGenerator:
- name: localblob
  envs:
  - configs/intgr.env
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: localblob
    app.kubernetes.io/instance: localblob
- includeSelectors: false
  pairs:
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/component: localblob
    app.kubernetes.io/part-of: dtkt-integrations-localblob
    app.kubernetes.io/managed-by: kustomize
