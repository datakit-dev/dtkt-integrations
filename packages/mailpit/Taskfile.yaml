version: '3'

env:
  GOEXPERIMENT: jsonv2

includes:
  go:
    taskfile: ${TASK_PATH}/Taskfile.go.yaml
    vars:
      GO_BUILD_BINARY: pkg

  sops:
    taskfile: ${TASK_PATH}/Taskfile.sops.yaml

  k:prd:
    taskfile: ${TASK_PATH}/Taskfile.kustomize.yaml
    dir: infra/kustomize/overlays/prd

  k:dev:
    taskfile: ${TASK_PATH}/Taskfile.kustomize.yaml
    dir: infra/kustomize/overlays/dev

tasks:
  setup:
    desc: Setup the dev environment
    cmds:
    - task: go:setup
    - mkdir -p {{.OPENAPI_DIR}}
    - pnpm dlx swagger2openapi --outfile {{.OPENAPI_PATH}} https://raw.githubusercontent.com/axllent/mailpit/master/server/ui/api/v1/swagger.json
    - |
      jq '
        .paths."/api/v1/webui".get.operationId = "GetWebUIConfiguration" |
        .components.responses.BinaryResponse.content = {"*/*":{"schema":{"type":"string","format":"binary"}}}
      ' {{.OPENAPI_PATH}} > tmp.json && mv tmp.json {{.OPENAPI_PATH}}
    vars:
      OPENAPI_DIR: pkg/oapi
      OPENAPI_PATH: "{{.OPENAPI_DIR}}/openapi.json"

  dev:
    cmds:
    - dtkt intgr dev

  generate:
    desc: Code generation
    cmds:
    - task: go:generate

  vhs-tapes:
    desc: Generate vhs tapes
    cmds:
    - for: { var: TAPES, as: TAPE }
      cmd: vhs {{.TAPE}} -o $(dirname {{.TAPE}})/$(basename {{.TAPE}} .tape).gif
    vars:
      TAPES:
        sh: find ./examples -name '*.tape' {{.CLI_ARGS}}

  docs:
    desc: Generate documentation
    cmds:
    - task: vhs-tapes

  lint:
    cmds:
    - task: go:lint

  build:
    cmds:
    - task: go:build

  test:
    cmds:
    - task: go:test
