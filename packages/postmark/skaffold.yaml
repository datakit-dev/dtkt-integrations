apiVersion: skaffold/v4beta12
kind: Config
metadata:
  name: postmark
build:
  local:
    useBuildkit: true
  artifacts:
  - image: epostmark
    context: ../../../
    docker:
      dockerfile: dtkt-integrations/packages/postmark/Dockerfile
manifests:
  kustomize:
    buildArgs:
    - --enable-alpha-plugins
    - --enable-exec
    paths:
    - infra/kustomize/overlays/dev
deploy:
  kubeContext: kind-dtkt-local
  kubectl:
    defaultNamespace: dtkt-integrations
portForward:
- resourceType: service
  resourceName: postmark
  port: 80
  localPort: 8203
