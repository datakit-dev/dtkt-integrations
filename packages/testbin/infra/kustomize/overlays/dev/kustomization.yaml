apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: testbin
  envs:
  - configs/intgr.env
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: testbin
    app.kubernetes.io/instance: testbin
- includeSelectors: false
  pairs:
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/component: testbin
    app.kubernetes.io/part-of: dtkt-integrations-testbin
    app.kubernetes.io/managed-by: kustomize
